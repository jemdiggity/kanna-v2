<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTY Restore Harness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101215;
      --panel: #171b21;
      --panel-2: #1f252d;
      --text: #e6edf3;
      --muted: #8b98a5;
      --accent: #4fb3ff;
      --border: #2d3742;
      --danger: #ff7b72;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      grid-template-rows: auto 1fr;
      background: radial-gradient(circle at top, #18202a, var(--bg) 48%);
      color: var(--text);
      font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr repeat(7, auto);
      gap: 10px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 92%, black);
    }
    .session-box {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .session-box input, .session-box select {
      min-width: 0;
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    button.primary {
      background: color-mix(in srgb, var(--accent) 22%, var(--panel-2));
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
    }
    button.danger {
      background: color-mix(in srgb, var(--danger) 18%, var(--panel-2));
      border-color: color-mix(in srgb, var(--danger) 35%, var(--border));
    }
    .status {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .terminal-wrap {
      min-height: 0;
      padding: 12px;
    }
    #terminal {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0d1117;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="session-box">
      <select id="profile">
        <option value="codex">Codex</option>
        <option value="claude">Claude</option>
        <option value="copilot">Copilot</option>
        <option value="shell">Shell</option>
      </select>
      <input id="sessionId" placeholder="session id" />
    </div>
    <button class="primary" id="spawnBtn">Spawn</button>
    <button id="attachBtn">Attach Fresh Client</button>
    <button id="detachBtn">Detach Client</button>
    <button id="resizeBtn">Resize Wiggle</button>
    <button class="danger" id="killBtn">Kill PTY</button>
    <div class="status" id="status">idle</div>
  </div>
  <div class="terminal-wrap">
    <div id="terminal"></div>
  </div>

  <script type="module">
    import * as XtermModule from "https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/+esm";
    import * as FitModule from "https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/+esm";

    const Terminal = XtermModule.Terminal ?? XtermModule.default?.Terminal;
    const FitAddon = FitModule.FitAddon ?? FitModule.default?.FitAddon ?? FitModule.default;

    const statusEl = document.getElementById("status");
    const sessionIdInput = document.getElementById("sessionId");
    const profileSelect = document.getElementById("profile");
    const spawnBtn = document.getElementById("spawnBtn");
    const attachBtn = document.getElementById("attachBtn");
    const detachBtn = document.getElementById("detachBtn");
    const resizeBtn = document.getElementById("resizeBtn");
    const killBtn = document.getElementById("killBtn");
    const terminalHost = document.getElementById("terminal");

    let term;
    let fitAddon;
    let ws = null;
    let detachInput = null;
    let resizeDisposable = null;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function currentSessionId() {
      return sessionIdInput.value.trim();
    }

    function ensureSessionId() {
      if (!currentSessionId()) {
        sessionIdInput.value = `restore-${Date.now().toString(36)}`;
      }
      return currentSessionId();
    }

    function createTerminal() {
      terminalHost.replaceChildren();
      term = new Terminal({
        fontFamily: '"JetBrains Mono", "SF Mono", Menlo, monospace',
        fontSize: 13,
        scrollback: 10000,
        cursorBlink: true,
        theme: {
          background: "#0d1117",
          foreground: "#e6edf3",
          cursor: "#58a6ff"
        }
      });
      fitAddon = new FitAddon();
      term.loadAddon(fitAddon);
      term.open(terminalHost);
      fitAddon.fit();
    }

    function profileCommand(profile) {
      if (profile === "codex") return { executable: "/bin/zsh", args: ["--login", "-c", "codex"] };
      if (profile === "claude") return { executable: "/bin/zsh", args: ["--login", "-c", "claude"] };
      if (profile === "copilot") return { executable: "/bin/zsh", args: ["--login", "-c", "copilot"] };
      return { executable: "/bin/zsh", args: ["--login"] };
    }

    function closeClient() {
      detachInput?.dispose();
      detachInput = null;
      resizeDisposable?.dispose();
      resizeDisposable = null;
      ws?.close();
      ws = null;
    }

    function attachFreshClient(sessionId) {
      closeClient();
      createTerminal();
      setStatus(`attaching ${sessionId}`);

      ws = new WebSocket(`ws://${location.host}/ws?session=${encodeURIComponent(sessionId)}`);
      ws.binaryType = "arraybuffer";

      ws.addEventListener("open", () => {
        ws.send(JSON.stringify({
          type: "attach",
          sessionId,
          cols: term.cols,
          rows: term.rows
        }));
      });

      ws.addEventListener("message", (event) => {
        if (event.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(event.data));
          return;
        }

        const msg = JSON.parse(event.data);
        if (msg.type === "attached") {
          setStatus(`attached ${sessionId} with vt100 snapshot restore`);
          detachInput = term.onData((data) => {
            ws?.send(JSON.stringify({
              type: "input",
              sessionId,
              data: Array.from(new TextEncoder().encode(data))
            }));
          });
          resizeDisposable = term.onResize(({ cols, rows }) => {
            ws?.send(JSON.stringify({ type: "resize", sessionId, cols, rows }));
          });
          return;
        }
        if (msg.type === "detached") {
          setStatus(`detached ${sessionId}`);
          return;
        }
        if (msg.type === "error") {
          setStatus(`error: ${msg.message}`);
          term.write(`\r\n[error] ${msg.message}\r\n`);
        }
      });
    }

    spawnBtn.addEventListener("click", async () => {
      const sessionId = ensureSessionId();
      const command = profileCommand(profileSelect.value);
      const response = await fetch("/spawn", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          sessionId,
          executable: command.executable,
          args: command.args,
          cwd: "/tmp"
        })
      });
      const data = await response.json();
      if (!response.ok) {
        setStatus(`spawn failed: ${data.error}`);
        return;
      }
      attachFreshClient(sessionId);
    });

    attachBtn.addEventListener("click", () => attachFreshClient(ensureSessionId()));

    detachBtn.addEventListener("click", () => {
      const sessionId = currentSessionId();
      if (!sessionId || !ws) return;
      ws.send(JSON.stringify({ type: "detach", sessionId }));
      closeClient();
      setStatus(`client detached ${sessionId}`);
    });

    resizeBtn.addEventListener("click", () => {
      const sessionId = currentSessionId();
      if (!sessionId || !ws || !term) return;
      ws.send(JSON.stringify({ type: "resize", sessionId, cols: Math.max(20, term.cols - 1), rows: term.rows }));
      ws.send(JSON.stringify({ type: "resize", sessionId, cols: term.cols, rows: term.rows }));
    });

    killBtn.addEventListener("click", async () => {
      const sessionId = currentSessionId();
      if (!sessionId) return;
      const response = await fetch("/kill", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ sessionId })
      });
      const data = await response.json();
      setStatus(response.ok ? `killed ${sessionId}` : `kill failed: ${data.error}`);
    });

    createTerminal();
    sessionIdInput.value = `restore-${Date.now().toString(36)}`;
  </script>
</body>
</html>
